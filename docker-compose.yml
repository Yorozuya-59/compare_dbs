services:
  # 1. MySQL (リレーショナルDBの代表格)
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: always
    command: --max_allowed_packet=512M
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. PostgreSQL (MySQLの最大の比較対象 / 機能特化型RDBMS)
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: mydatabase
      # --- ここを追加 ---
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # --- ここを修正 ---
      - postgres_data:/var/lib/postgresql/data
  
  # 3. MongoDB (NoSQL / ドキュメント指向DBの代表格)
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 4. Redis (インメモリ / KVSの代表格・最速の基準値として)
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: redis-server --requirepass rootpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# 5. SurrealDB (Rust製 / 最新のマルチモデルDB)
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: surrealdb
    restart: always
    # --- 以下の行を追加（強制的にroot権限でコンテナを動かし、ボリュームへの書き込みを許可する） ---
    user: root
    # --- bind設定と、rocksdb:/// (スラッシュ3つ) の絶対パスに修正 ---
    command: start --bind 0.0.0.0:8000 --user root --pass rootpassword rocksdb:///var/lib/surrealdb
    ports:
      - "8000:8000"
    volumes:
      - surreal_data:/var/lib/surrealdb
  
  # 6. ClickHouse (カラム指向・超高速OLAP DB)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: always
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: rootpassword
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  # 7. TimescaleDB (PostgreSQLベースの時系列DB)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: mydatabase
    ports:
      - "5433:5432" # ホスト側は5433にずらす
    volumes:
      - timescale_data:/var/lib/postgresql/data

  # 8. InfluxDB (時系列DBの代表格)
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: rootpassword
      DOCKER_INFLUXDB_INIT_ORG: benchmark_org
      DOCKER_INFLUXDB_INIT_BUCKET: benchmark_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: benchmark_token_12345
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # 9. ScyllaDB (Cassandra互換・C++実装の超高速ワイドカラムストア)
  scylladb:
    image: scylladb/scylla:latest
    container_name: scylladb
    restart: always
    # ローカル検証用にリソースを制限（これをしないとMacがハングする可能性があります）
    command: --smp 1 --memory 1G
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
  
  # ベンチマーク実行用コンテナ
  benchmarker:
    build: ./environment     # environmentディレクトリをビルドの基準にする
    container_name: python_benchmarker
    tty: true
    stdin_open: true         # 起動させ続けるための設定
    command: ["tail", "-f", "/dev/null"]  # 起動させ続けるための設定
    volumes:
      - ./src:/app/src       # ホストのsrcディレクトリをコンテナ内の/app/srcにマウント
    # depends_on:
    #   - mysql
    #   - postgres
    #   - mongodb
    #   - redis
    #   - surrealdb
    #   - clickhouse
    #   - timescaledb
    #   - influxdb
    #   - scylladb
    networks:
      - default
  
volumes:
  mysql_data:
  postgres_data:
  mongodb_data:
  redis_data:
  surreal_data:
  clickhouse_data:
  timescale_data:
  influxdb_data:
  scylla_data:

networks:
  default:
    driver: bridge
